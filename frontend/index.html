<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAR-token | System Gregory PC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <header class="border-b border-slate-800 p-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-yellow-500">WAR-token</h1>
            <p class="text-xs text-slate-400">by System Gregory PC</p>
        </div>
        <button id="connectWallet" class="bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded-lg font-medium transition">
            Conectar Billetera
        </button>
    </header>

    <main class="max-w-6xl mx-auto p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-slate-400 text-sm mb-2">Deuda Total (WAR)</h3>
                <p id="totalSupply" class="text-3xl font-mono text-white">0.00</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-slate-400 text-sm mb-2">Respaldo (Oro/Crudo)</h3>
                <p class="text-3xl font-mono text-yellow-500">$5.2T</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-slate-400 text-sm mb-2">Tasa de Quema Actual</h3>
                <p id="currentBurnRate" class="text-3xl font-mono text-green-400">2%</p>
            </div>
        </div>

        <div class="bg-slate-800 p-8 rounded-2xl border border-yellow-900/30">
            <h2 class="text-xl font-bold mb-6 flex items-center">
                🔥 Panel de Autoliquidación
            </h2>
            <div class="space-y-4">
                <label class="block text-sm text-slate-400">Cantidad a liquidar (WAR)</label>
                <input type="number" id="burnAmount" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-lg focus:outline-none focus:border-yellow-500" placeholder="Ej: 1000000">
                
                <button id="btnLiquidate" class="w-full bg-red-600 hover:bg-red-500 py-4 rounded-xl font-bold text-lg transition shadow-lg shadow-red-900/20">
                    EJECUTAR QUEMA DE DEUDA
                </button>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
